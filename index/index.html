<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Realtime App</title>

  <!-- Шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a0dad, #a855f7);
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #9333ea;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #7e22ce;
    }

    .post {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
    }

    .name {
      font-weight: 600; /* жирный */
      font-size: 16px;
    }

    .email {
      font-weight: 300; /* тонкий */
      font-size: 12px;
      opacity: 0.8;
    }

    .text {
      margin: 10px 0;
    }

    .like-btn {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>💜 Realtime Posts</h1>

  <input id="name" placeholder="Имя">
  <input id="email" placeholder="Email">
  <input id="text" placeholder="Сообщение">

  <button onclick="addPost()">Добавить</button>

  <div id="posts"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, 
  query, orderBy, updateDoc, doc, increment 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 ВСТАВЬ СВОЙ CONFIG
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyACjGfIaDqWSlEEQoP49uymk4XDyln3lpo",
  authDomain: "meow-8181d.firebaseapp.com",
  projectId: "meow-8181d",
  storageBucket: "meow-8181d.firebasestorage.app",
  messagingSenderId: "463138208934",
  appId: "1:463138208934:web:89f518f6f8114004f20867",
  measurementId: "G-G8QNPB7QXH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ добавить пост
window.addPost = async () => {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const text = document.getElementById("text").value;

  await addDoc(collection(db, "posts"), {
    name,
    email,
    text,
    timestamp: Date.now(),
    likes: 0
  });
};
