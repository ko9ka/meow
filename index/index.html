<!DOCTYPE html>
<html>
<head>
  <title>Realtime Firebase App</title>
</head>
<body>

<h2>Посты</h2>

<input id="text" placeholder="Введите текст поста">
<button onclick="addPost()">Отправить</button>

<div id="posts"></div>

<!-- Здесь вставляем весь Firebase JS -->
<script type="module">
  // 🔹 Подключение Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, onSnapshot, 
    query, orderBy, updateDoc, doc, increment 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyACjGfIaDqWSlEEQoP49uymk4XDyln3lpo",
  authDomain: "meow-8181d.firebaseapp.com",
  projectId: "meow-8181d",
  storageBucket: "meow-8181d.firebasestorage.app",
  messagingSenderId: "463138208934",
  appId: "1:463138208934:web:89f518f6f8114004f20867",
  measurementId: "G-G8QNPB7QXH"
};
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔹 Добавление поста
  async function addPost() {
    const text = document.getElementById("text").value;

    if(!text.trim()) return; // Не отправлять пустой текст

    await addDoc(collection(db, "posts"), {
      text: text,
      timestamp: Date.now(),
      likes: 0
    });

    document.getElementById("text").value = ""; // очистка поля
  }

  // 🔹 Реактивная лента (🔥 ключ к «отлично»)
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("posts");
    list.innerHTML = "";

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      list.innerHTML += `
        <div>
          <p>${data.text}</p>
          <button onclick="likePost('${docSnap.id}')">
            ❤️ ${data.likes}
          </button>
        </div>
      `;
    });
  });

  // 🔹 Лайки (атомарность 💥)
  window.likePost = async (id) => {
    const ref = doc(db, "posts", id);

    await updateDoc(ref, {
      likes: increment(1)
    });
  };

  // Сделаем доступной функцию добавления
  window.addPost = addPost;

</script>

</body>
</html>
