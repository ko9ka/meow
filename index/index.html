<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, 
  query, orderBy, updateDoc, doc, increment 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  // Вставь сюда свой config из Firebase Project Settings
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Добавление поста
async function addPost() {
  const text = document.getElementById("text").value;
  const email = document.getElementById("email").value;

  if(!text.trim() || !email.includes("@")) return;

  await addDoc(collection(db, "requests"), {
    name: text,
    email: email,
    likes: 0,
    timestamp: Date.now()
  });

  document.getElementById("text").value = "";
  document.getElementById("email").value = "";
}

// Реактивная лента
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const list = document.getElementById("posts");
  list.innerHTML = "";
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    list.innerHTML += `
      <div>
        <p>${data.name} (${data.email}) ❤️ ${data.likes}</p>
        <button onclick="likePost('${docSnap.id}')">Like</button>
      </div>
    `;
  });
});

// Атомарные лайки
window.likePost = async (id) => {
  const ref = doc(db, "requests", id);
  await updateDoc(ref, { likes: increment(1) });
};

window.addPost = addPost;
</script>
